name: quality

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Fetch revenue contract runtime
        run: git clone --depth 1 https://github.com/zhengcb81/revenue-forecast.git ../revenue-forecast
      - name: Run release gate
        run: python tools/verify_suite.py --revenue-dir ../revenue-forecast --skip-install-check
